<h2 mat-dialog-title>{{ isEdit ? 'Editar Gasto' : 'Nuevo Gasto' }}</h2>
<mat-dialog-content>
  <form [formGroup]="form" class="dialog-form">
    <div class="field-row">
      <div class="field">
        <label>Fecha
          <input formControlName="date" type="date" />
        </label>
      </div>
      @if (isAdmin()) {
        <div class="field">
          <label>Usuario
            <app-select formControlName="userId" [items]="users"></app-select>
          </label>
        </div>
      }
    </div>
    <div class="field">
      <label>Descripción
        <input formControlName="description" type="text" placeholder="Descripción de la transacción..." />
      </label>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Comercio (opcional)
          <app-select formControlName="commerceId" nullLabel="Sin comercio" [items]="commerces" labelKey="displayName"></app-select>
        </label>
      </div>
      <div class="field">
        <label>Categoría
          <app-select formControlName="categoryId" [items]="categories"></app-select>
        </label>
      </div>
    </div>
    <div class="field">
      <label>Medio de Pago (opcional)
        <app-select formControlName="paymentMethodId" nullLabel="Sin medio de pago" [items]="paymentMethods" labelKey="displayName"></app-select>
      </label>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Monto Bruto (Gs.)
          <input formControlName="grossAmount" appThousands (input)="onGrossAmountChange()" />
        </label>
      </div>
      <div class="field">
        <label>Descuento
          <div class="discount-row">
            <div class="type-toggle">
              <button type="button" [class.active]="discountType() === 'gs'" (click)="setDiscountType('gs')">Gs.</button>
              <button type="button" [class.active]="discountType() === 'pct'" (click)="setDiscountType('pct')">%</button>
            </div>
            @if (discountType() === 'gs') {
              <input formControlName="discountAmount" appThousands (input)="onDiscountInput()" />
            } @else {
              <input formControlName="discountPercent" type="number" min="0" max="100" step="0.1" placeholder="0" (input)="onDiscountInput()" />
            }
          </div>
        </label>
      </div>
    </div>
    <div class="field">
      <label>Monto Neto (Gs.)
        <input formControlName="netAmount" appThousands />
      </label>
    </div>
    <div class="field">
      <label>Notas (opcional)
        <textarea formControlName="notes" rows="2" placeholder="Observaciones..."></textarea>
      </label>
    </div>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-stroked-button mat-dialog-close class="btn-cancel">Cancelar</button>
  <button mat-flat-button class="btn-primary" (click)="onSubmit()" [disabled]="form.invalid || saving">Guardar</button>
</mat-dialog-actions>
