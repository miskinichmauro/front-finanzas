<app-page-header title="Grupos de Reparto" subtitle="Gestión de grupos para dividir gastos compartidos" />

<div class="page-toolbar">
  <div class="toolbar-field">
    <label>Buscar
      <input type="search" [(ngModel)]="searchText" (input)="applyFilter()" placeholder="Buscar grupo..." style="width: 200px" />
    </label>
  </div>
  <div class="flex-1"></div>
  <button mat-flat-button class="btn-primary" (click)="openCreate()">
    <mat-icon>add</mat-icon>Nuevo Grupo
  </button>
</div>

@if (loading()) {
  <div class="loading-center"><mat-spinner /></div>
} @else {
  <div class="table-card">
    <div class="table-scroll">
      <table mat-table [dataSource]="dataSource" matSort>
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Nombre</th>
          <td mat-cell *matCellDef="let row">{{ row.name }}</td>
        </ng-container>

        <ng-container matColumnDef="members">
          <th mat-header-cell *matHeaderCellDef>Miembros</th>
          <td mat-cell *matCellDef="let row">{{ getMemberNames(row) }}</td>
        </ng-container>

        <ng-container matColumnDef="isActive">
          <th mat-header-cell *matHeaderCellDef>Estado</th>
          <td mat-cell *matCellDef="let row">
            <span class="badge" [ngClass]="row.isActive ? 'badge--green' : 'badge--red'">{{ row.isActive ? 'Activo' : 'Inactivo' }}</span>
          </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Acciones</th>
          <td mat-cell *matCellDef="let row">
            <app-row-actions
              [showLeave]="canLeaveGroup(row)"
              leaveTooltip="Salir del grupo"
              editTooltip="Editar grupo"
              deleteTooltip="Eliminar grupo"
              (leaveAction)="openLeaveGroup(row)"
              (editAction)="openEdit(row)"
              (deleteAction)="openDelete(row)" />
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        <tr *matNoDataRow>
          <td [attr.colspan]="displayedColumns.length" class="empty-row-cell">
            <div class="empty-state">
              <mat-icon>group_off</mat-icon>
              <span>{{ searchText ? 'No hay grupos que coincidan con la búsqueda' : 'No hay grupos de reparto creados' }}</span>
            </div>
          </td>
        </tr>
      </table>
    </div>
    <div class="table-footer">
      <mat-paginator [pageSizeOptions]="[10, 25, 50]" showFirstLastButtons />
    </div>
  </div>
}
