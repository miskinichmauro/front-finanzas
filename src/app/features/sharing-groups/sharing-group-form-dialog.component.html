<h2 mat-dialog-title>{{ isEdit ? 'Editar Grupo' : 'Nuevo Grupo de Reparto' }}</h2>
<mat-dialog-content>
  <form [formGroup]="form" class="dialog-form">
    <div class="field">
      <label>Nombre del grupo
        <input formControlName="name" placeholder="Ej: Casa" />
      </label>
    </div>
    <mat-checkbox formControlName="isActive">Activo</mat-checkbox>
    <div class="field">
      <p class="field-label">Miembros del grupo</p>
      <p class="field-hint">Solo podés agregar amigos aceptados</p>
      <app-multi-select
        [items]="memberOptions"
        [(ngModel)]="selectedMemberIds"
        [ngModelOptions]="{standalone: true}"
        placeholder="Buscar y seleccionar amigos...">
      </app-multi-select>
      @if (!hasMembers) {
        <span class="field-error">Debe haber al menos un miembro</span>
      }
    </div>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-stroked-button mat-dialog-close class="btn-cancel">Cancelar</button>
  <button mat-flat-button class="btn-primary" (click)="onSubmit()" [disabled]="form.invalid || saving || !hasMembers">Guardar</button>
</mat-dialog-actions>
