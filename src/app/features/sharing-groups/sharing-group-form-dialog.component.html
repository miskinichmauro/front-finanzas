<h2 mat-dialog-title>{{ isEdit ? 'Editar Grupo de Reparto' : 'Nuevo Grupo de Reparto' }}</h2>
<mat-dialog-content>
  <form [formGroup]="form" class="flex flex-col gap-4 pt-2 min-w-80">
    <mat-form-field appearance="outline">
      <mat-label>Nombre del grupo</mat-label>
      <input matInput formControlName="name" />
      @if (form.get('name')?.hasError('required')) {
        <mat-error>El nombre es requerido</mat-error>
      }
    </mat-form-field>

    <mat-checkbox formControlName="isActive">Activo</mat-checkbox>

    <div>
      <p class="text-sm font-medium text-gray-700 mb-2">Miembros del grupo:</p>
      @for (user of users; track user.id) {
        <mat-checkbox
          [checked]="isSelected(user.id)"
          (change)="toggleUser(user.id)"
          class="block mb-1"
        >
          {{ user.name }}
        </mat-checkbox>
      }
    </div>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancelar</button>
  <button mat-flat-button color="primary" (click)="onSubmit()" [disabled]="form.invalid">
    Guardar
  </button>
</mat-dialog-actions>
