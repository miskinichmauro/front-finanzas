<h2 mat-dialog-title>{{ isEdit ? 'Editar Compromiso Compartido' : 'Nuevo Compromiso Compartido' }}</h2>
<mat-dialog-content>
  <form [formGroup]="form" class="dialog-form">
    <div class="field-row">
      <div class="field">
        <label>Fecha
          <input formControlName="date" type="date" />
        </label>
      </div>
      <div class="field">
        <label>Grupo de Reparto
          <app-select formControlName="sharingGroupId" [items]="sharingGroups"></app-select>
        </label>
      </div>
    </div>

    <div class="field">
      <label>Tipo de compromiso
        <app-select formControlName="isVariableBudget" [items]="commitmentTypeOptions"></app-select>
      </label>
      <div style="margin-top: 6px; font-size: 12px; color: var(--text-secondary); line-height: 1.35;">
        {{ commitmentTypeHint }}
      </div>
    </div>

    <div class="field">
      <label>Descripción
        <input formControlName="description" type="text" [placeholder]="isVariableBudget ? 'Ej: Presupuesto supermercado del mes' : 'Ej: Netflix'" />
      </label>
    </div>

    <div class="field-row">
      <div class="field">
        <label>Comercio (opcional)
          <app-select formControlName="commerceId" nullLabel="Sin comercio" [items]="commerces" labelKey="displayName"></app-select>
        </label>
      </div>
      <div class="field">
        <label>{{ categoryLabel }}
          <app-select formControlName="categoryId" [items]="categories"></app-select>
        </label>
      </div>
    </div>

    @if (isVariableBudget) {
      <div class="field-row">
        <div class="field">
          <label>Presupuesto del mes (Gs.)
            <input formControlName="monthlyBudget" appThousands placeholder="Ej: 500.000" />
          </label>
        </div>
        <div class="field">
          <label>Categoría destino
            <app-select formControlName="linkedCategoryId" nullLabel="Seleccionar..." [items]="categories"></app-select>
          </label>
        </div>
      </div>
      <div style="margin: -2px 0 10px; font-size: 12px; color: var(--text-secondary); line-height: 1.35;">
        El sistema compara el gasto destino del mes contra esta categoría y usa el presupuesto configurado para calcular el reparto.
      </div>
    } @else {
      <div class="field-row">
        <div class="field">
          <label>Monto bruto (Gs.)
            <input formControlName="grossAmount" appThousands (input)="onGrossAmountChange()" placeholder="Ej: 250.000" />
          </label>
        </div>
        <div class="field">
          <label>% descuento
            <input formControlName="discountPercent" type="number" min="0" max="100" (input)="onDiscountPercentChange()" placeholder="Ej: 10" />
          </label>
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Descuento (Gs.)
            <input formControlName="discountAmount" appThousands (input)="onDiscountAmountChange()" placeholder="Ej: 25.000" />
          </label>
        </div>
        <div class="field">
          <label>Monto neto (Gs.)
            <input formControlName="netAmount" appThousands readonly />
          </label>
        </div>
      </div>
    }

    <div class="field">
      <label>Medio de pago (opcional)
        <app-select formControlName="paymentMethodId" nullLabel="Sin medio de pago" [items]="paymentMethods" labelKey="displayName"></app-select>
      </label>
    </div>

    <div class="field">
      <label>Notas (opcional)
        <textarea formControlName="notes" rows="2" placeholder="Observaciones..."></textarea>
      </label>
    </div>

    <div class="field-row">
      <div class="field">
        <label>¿Quién paga? (opcional)
          <app-select formControlName="paidByUserId" nullLabel="Sin asignar" [items]="groupMembers"></app-select>
        </label>
      </div>
      <div class="field">
        <label>Orden de visualización
          <input formControlName="displayOrder" type="number" />
        </label>
      </div>
    </div>

    <mat-checkbox formControlName="isActive">Activo</mat-checkbox>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancelar</button>
  <button mat-flat-button class="btn-primary" (click)="onSubmit()" [disabled]="form.invalid || saving">Guardar</button>
</mat-dialog-actions>
