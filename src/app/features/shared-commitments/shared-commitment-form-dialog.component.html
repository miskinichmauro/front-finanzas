<h2 mat-dialog-title>{{ isEdit ? 'Editar Compromiso' : 'Nuevo Compromiso Compartido' }}</h2>
<mat-dialog-content>
  <form [formGroup]="form" class="dialog-form">
    <div class="field-row">
      <div class="field">
        <label>Fecha
          <input formControlName="date" type="date" />
        </label>
      </div>
      <div class="field">
        <label>Grupo de Reparto
          <app-select formControlName="sharingGroupId" [items]="sharingGroups"></app-select>
        </label>
      </div>
    </div>
    <div class="field">
      <label>Descripción
        <input formControlName="description" type="text" placeholder="Ej: Netflix" />
      </label>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Comercio (opcional)
          <app-select formControlName="commerceId" nullLabel="Sin comercio" [items]="commerces" labelKey="displayName"></app-select>
        </label>
      </div>
      <div class="field">
        <label>Categoría
          <app-select formControlName="categoryId" [items]="categories"></app-select>
        </label>
      </div>
    </div>
    <div class="field">
      <label>Medio de Pago (opcional)
        <app-select formControlName="paymentMethodId" nullLabel="Sin medio de pago" [items]="paymentMethods" labelKey="displayName"></app-select>
      </label>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Monto Bruto (Gs.)
          <input formControlName="grossAmount" appThousands (input)="onGrossAmountChange()" />
        </label>
      </div>
      <div class="field">
        <label>% Descuento
          <input formControlName="discountPercent" type="number" min="0" max="100" (input)="onDiscountPercentChange()" />
        </label>
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Descuento (Gs.)
          <input formControlName="discountAmount" appThousands (input)="onDiscountAmountChange()" />
        </label>
      </div>
      <div class="field">
        <label>Monto Neto (Gs.)
          <input formControlName="netAmount" appThousands />
        </label>
      </div>
    </div>
    <div class="field">
      <label>Notas (opcional)
        <textarea formControlName="notes" rows="2" placeholder="Observaciones..."></textarea>
      </label>
    </div>
    <div class="field-row">
      <div class="field">
        <label>¿Quién paga? (opcional)
          <app-select formControlName="paidByUserId" nullLabel="Sin asignar" [items]="groupMembers"></app-select>
        </label>
      </div>
      <div class="field">
        <label>Orden de visualización
          <input formControlName="displayOrder" type="number" />
        </label>
      </div>
    </div>
    <mat-checkbox formControlName="isActive">Activo</mat-checkbox>
    <mat-checkbox formControlName="isVariableBudget">Presupuesto Variable</mat-checkbox>
    @if (isVariableBudget) {
      <div class="field-row" style="margin-top: 12px">
        <div class="field">
          <label>Presupuesto Mensual (Gs.)
            <input formControlName="monthlyBudget" appThousands />
          </label>
        </div>
        <div class="field">
          <label>Categoría Vinculada
            <app-select formControlName="linkedCategoryId" nullLabel="Sin categoría" [items]="categories"></app-select>
          </label>
        </div>
      </div>
    }
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancelar</button>
  <button mat-flat-button class="btn-primary" (click)="onSubmit()" [disabled]="form.invalid || saving">Guardar</button>
</mat-dialog-actions>
