<h2 mat-dialog-title>{{ isEdit ? 'Editar Categoría' : 'Nueva Categoría' }}</h2>
<mat-dialog-content>
  <form [formGroup]="form" class="flex flex-col gap-4 pt-2">
    <mat-form-field appearance="outline">
      <mat-label>Nombre</mat-label>
      <input matInput formControlName="name" placeholder="Nombre de la categoría" />
      @if (form.get('name')?.hasError('required')) {
        <mat-error>El nombre es requerido</mat-error>
      }
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Categoría Padre (opcional)</mat-label>
      <mat-select formControlName="parentCategoryId">
        <mat-option [value]="null">Sin categoría padre</mat-option>
        @for (cat of categories; track cat.id) {
          <mat-option [value]="cat.id">{{ cat.name }}</mat-option>
        }
      </mat-select>
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancelar</button>
  <button mat-flat-button color="primary" (click)="onSubmit()" [disabled]="form.invalid">
    Guardar
  </button>
</mat-dialog-actions>
