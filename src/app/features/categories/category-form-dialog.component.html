<h2 mat-dialog-title>{{ isEdit ? 'Editar Categoría' : 'Nueva Categoría' }}</h2>
<mat-dialog-content>
  <form [formGroup]="form" class="dialog-form">
    <div class="field">
      <label>Nombre
        <input formControlName="name" placeholder="Nombre de la categoría" />
      </label>
    </div>
    <div class="field">
      <label>Grupo
        <app-select formControlName="groupId" placeholder="Seleccionar grupo" [items]="groups"></app-select>
      </label>
    </div>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-stroked-button mat-dialog-close class="btn-cancel">Cancelar</button>
  <button mat-flat-button class="btn-primary" (click)="onSubmit()" [disabled]="form.invalid || saving">Guardar</button>
</mat-dialog-actions>
