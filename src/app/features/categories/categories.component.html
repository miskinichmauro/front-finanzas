<app-page-header title="Categorías" subtitle="Gestión de categorías de gastos e ingresos" />

<div class="page-toolbar">
  <div class="toolbar-field">
    <label>Buscar
      <input type="search" [(ngModel)]="searchText" (input)="applyFilter()" placeholder="Busqueda" style="width: 200px" />
    </label>
  </div>
  <button mat-flat-button class="btn-primary" style="margin-left:auto" (click)="openCreate()">
    <mat-icon>add</mat-icon> Nueva Categoría
  </button>
</div>

<div class="table-card">
  <div class="table-scroll">
  <table mat-table [dataSource]="dataSource" matSort>
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Nombre</th>
      <td mat-cell *matCellDef="let row">{{ row.name }}</td>
    </ng-container>

    <ng-container matColumnDef="parentCategoryId">
      <th mat-header-cell *matHeaderCellDef>Categoría Padre</th>
      <td mat-cell *matCellDef="let row">{{ getParentName(row.parentCategoryId) }}</td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Acciones</th>
      <td mat-cell *matCellDef="let row">
        <button mat-icon-button color="primary" (click)="openEdit(row)"><mat-icon>edit</mat-icon></button>
        <button mat-icon-button color="warn" (click)="openDelete(row)"><mat-icon>delete</mat-icon></button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    <tr *matNoDataRow>
      <td [attr.colspan]="displayedColumns.length" class="empty-row-cell">
        @if (loading()) {
          <div class="loading-center"><mat-spinner /></div>
        } @else {
          <div class="empty-state">
            <mat-icon>category</mat-icon>
            <span>No hay categorías registradas</span>
          </div>
        }
      </td>
    </tr>
  </table>
  </div>
  <div class="table-footer">
    <mat-paginator [pageSizeOptions]="[10, 25, 50]" showFirstLastButtons />
  </div>
</div>
