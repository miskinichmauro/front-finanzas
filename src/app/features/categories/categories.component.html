<app-page-header title="Categorías" subtitle="Gestión de categorías de gastos e ingresos" />

<div class="flex justify-end mb-4">
  <button mat-flat-button color="primary" (click)="openCreate()">
    <mat-icon>add</mat-icon> Nueva Categoría
  </button>
</div>

@if (loading()) {
  <div class="flex justify-center py-12"><mat-spinner /></div>
} @else {
  <div class="mat-elevation-z2 rounded-lg overflow-hidden">
    <table mat-table [dataSource]="dataSource" matSort>
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Nombre</th>
        <td mat-cell *matCellDef="let row">{{ row.name }}</td>
      </ng-container>

      <ng-container matColumnDef="parentCategoryId">
        <th mat-header-cell *matHeaderCellDef>Categoría Padre</th>
        <td mat-cell *matCellDef="let row">{{ getParentName(row.parentCategoryId) }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Acciones</th>
        <td mat-cell *matCellDef="let row">
          <button mat-icon-button color="primary" (click)="openEdit(row)"><mat-icon>edit</mat-icon></button>
          <button mat-icon-button color="warn" (click)="openDelete(row)"><mat-icon>delete</mat-icon></button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
    <mat-paginator [pageSizeOptions]="[10, 25, 50]" showFirstLastButtons />
  </div>
}
