<app-page-header title="Gastos del Período" subtitle="Egresos y otros gastos por mes" />

<div class="flex flex-wrap gap-4 items-center mb-4">
  <mat-form-field appearance="outline" class="w-32">
    <mat-label>Año</mat-label>
    <input matInput type="number" [(ngModel)]="filterYear" (change)="loadData()" />
  </mat-form-field>

  <mat-form-field appearance="outline" class="w-40">
    <mat-label>Mes</mat-label>
    <mat-select [(ngModel)]="filterMonth" (selectionChange)="loadData()">
      @for (m of months; track m.value) {
        <mat-option [value]="m.value">{{ m.label }}</mat-option>
      }
    </mat-select>
  </mat-form-field>

  <div class="flex-1"></div>
  <button mat-flat-button color="primary" (click)="openCreate()">
    <mat-icon>add</mat-icon> Nuevo Gasto
  </button>
</div>

@if (loading()) {
  <div class="flex justify-center py-12"><mat-spinner /></div>
} @else {
  <div class="mat-elevation-z2 rounded-lg overflow-hidden">
    <table mat-table [dataSource]="dataSource" matSort>
      <ng-container matColumnDef="description">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Descripción</th>
        <td mat-cell *matCellDef="let row">{{ row.description }}</td>
      </ng-container>

      <ng-container matColumnDef="type">
        <th mat-header-cell *matHeaderCellDef>Tipo</th>
        <td mat-cell *matCellDef="let row"><mat-chip>{{ row.type }}</mat-chip></td>
      </ng-container>

      <ng-container matColumnDef="userName">
        <th mat-header-cell *matHeaderCellDef>Usuario</th>
        <td mat-cell *matCellDef="let row">{{ getUserName(row.userId) }}</td>
      </ng-container>

      <ng-container matColumnDef="amount">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Monto</th>
        <td mat-cell *matCellDef="let row" class="text-right">Gs. {{ formatAmount(row.amount) }}</td>
      </ng-container>

      <ng-container matColumnDef="isPaid">
        <th mat-header-cell *matHeaderCellDef>Pagado</th>
        <td mat-cell *matCellDef="let row">
          <mat-icon [color]="row.isPaid ? 'primary' : ''">
            {{ row.isPaid ? 'check_circle' : 'radio_button_unchecked' }}
          </mat-icon>
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Acciones</th>
        <td mat-cell *matCellDef="let row">
          <button mat-icon-button color="primary" (click)="openEdit(row)"><mat-icon>edit</mat-icon></button>
          <button mat-icon-button color="warn" (click)="openDelete(row)"><mat-icon>delete</mat-icon></button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
    <mat-paginator [pageSizeOptions]="[10, 25, 50]" showFirstLastButtons />
  </div>
}
