<h2 mat-dialog-title>{{ isEdit ? 'Editar Gasto del Período' : 'Nuevo Gasto del Período' }}</h2>
<mat-dialog-content>
  <form [formGroup]="form" class="dialog-form">
    <div class="field-row">
      <div class="field">
        <label>Año
          <input formControlName="year" type="number" min="2000" max="2100" />
        </label>
      </div>
      <div class="field">
        <label>Mes
          <app-select formControlName="month" [items]="months" valueKey="value" labelKey="label"></app-select>
        </label>
      </div>
    </div>
    @if (isAdmin()) {
      <div class="field">
        <label>Usuario
          <app-select formControlName="userId" [items]="users"></app-select>
        </label>
      </div>
    }
    <div class="field-row">
      <div class="field">
        <label>Categoría
          <app-select formControlName="categoryId" [items]="categories"></app-select>
        </label>
      </div>
      <div class="field">
        <label>Medio de Pago
          <app-select formControlName="paymentMethodId" [items]="paymentMethods"></app-select>
        </label>
      </div>
    </div>
    <div class="field">
      <label>Descripción
        <input formControlName="description" placeholder="Ej: Internet" />
      </label>
    </div>
    <div class="field">
      <label>Monto (Gs.)
        <input formControlName="amount" appThousands />
      </label>
    </div>
    <div class="field">
      <label>Notas (opcional)
        <textarea formControlName="notes" rows="2" placeholder="Observaciones..."></textarea>
      </label>
    </div>
    <mat-checkbox formControlName="isPaid">Pagado</mat-checkbox>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancelar</button>
  <button mat-flat-button class="btn-primary" (click)="onSubmit()" [disabled]="form.invalid || saving">Guardar</button>
</mat-dialog-actions>
