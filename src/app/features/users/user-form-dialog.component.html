<h2 mat-dialog-title>{{ isEdit ? 'Editar Usuario' : 'Nuevo Usuario' }}</h2>
<mat-dialog-content>
  <p class="dialog-subtitle">
    {{ isEdit ? 'Actualizá los datos y permisos del usuario.' : 'Completá los datos para crear el acceso al sistema.' }}
  </p>
  <form [formGroup]="form" class="dialog-form">
    <div class="field">
      <label>Nombre
        <input formControlName="name" placeholder="Nombre del usuario" />
      </label>
    </div>
    <div class="field">
      <label>Email
        <input type="email" formControlName="email" placeholder="usuario@ejemplo.com" />
      </label>
    </div>
    <div [class.field-row]="!isEdit">
      @if (!isEdit) {
        <div class="field">
          <label>Contraseña
            <input type="password" formControlName="password" placeholder="Mínimo 6 caracteres" autocomplete="new-password" />
          </label>
        </div>
      }
      <div class="field">
        <label>Rol
          <app-select formControlName="role" [items]="roleItems" valueKey="value" labelKey="label"></app-select>
        </label>
      </div>
    </div>
    <div class="dialog-checkbox">
      <mat-checkbox formControlName="isActive">Usuario activo</mat-checkbox>
      <span>Puede iniciar sesión y utilizar el sistema.</span>
    </div>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancelar</button>
  <button mat-flat-button class="btn-primary" (click)="onSubmit()" [disabled]="form.invalid || saving">Guardar</button>
</mat-dialog-actions>
