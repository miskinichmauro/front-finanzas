<app-page-header title="Usuarios" subtitle="Gestión de usuarios del sistema" />

<div class="page-toolbar">
  <div class="toolbar-field">
    <label>Buscar
      <input type="search" [(ngModel)]="searchText" (input)="applyFilter()" placeholder="Busqueda" style="width: 200px" />
    </label>
  </div>
  @if (isAdmin()) {
    <button mat-flat-button class="btn-primary" style="margin-left:auto" (click)="openCreate()">
      <mat-icon>add</mat-icon> Nuevo Usuario
    </button>
  }
</div>

<div class="table-card">
  <div class="table-scroll">
  <table mat-table [dataSource]="dataSource" matSort>
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Nombre</th>
      <td mat-cell *matCellDef="let row">{{ row.name }}</td>
    </ng-container>

    <ng-container matColumnDef="isActive">
      <th mat-header-cell *matHeaderCellDef>Estado</th>
      <td mat-cell *matCellDef="let row">
        <span [class]="'status-badge ' + (row.isActive ? 'badge-active' : 'badge-inactive')">
          {{ row.isActive ? 'Activo' : 'Inactivo' }}
        </span>
      </td>
    </ng-container>

    @if (isAdmin()) {
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Acciones</th>
        <td mat-cell *matCellDef="let row">
          <button mat-icon-button color="primary" (click)="openEdit(row)" title="Editar">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="openDelete(row)" title="Eliminar">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>
    }

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    <tr *matNoDataRow>
      <td [attr.colspan]="displayedColumns.length" class="empty-row-cell">
        @if (loading()) {
          <div class="loading-center"><mat-spinner /></div>
        } @else {
          <div class="empty-state">
            <mat-icon>person_off</mat-icon>
            <span>No hay usuarios registrados</span>
          </div>
        }
      </td>
    </tr>
  </table>
  </div>
  <div class="table-footer">
    <mat-paginator [pageSizeOptions]="[10, 25, 50]" showFirstLastButtons />
  </div>
</div>
