<app-page-header title="Usuarios" subtitle="Gestión de usuarios del sistema" />

<div class="flex justify-end mb-4">
  <button mat-flat-button color="primary" (click)="openCreate()">
    <mat-icon>add</mat-icon> Nuevo Usuario
  </button>
</div>

@if (loading()) {
  <div class="flex justify-center py-12"><mat-spinner /></div>
} @else {
  <div class="mat-elevation-z2 rounded-lg overflow-hidden">
    <table mat-table [dataSource]="dataSource" matSort>
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Nombre</th>
        <td mat-cell *matCellDef="let row">{{ row.name }}</td>
      </ng-container>

      <ng-container matColumnDef="isActive">
        <th mat-header-cell *matHeaderCellDef>Estado</th>
        <td mat-cell *matCellDef="let row">
          <mat-chip [class]="row.isActive ? 'chip-active' : 'chip-inactive'">
            {{ row.isActive ? 'Activo' : 'Inactivo' }}
          </mat-chip>
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Acciones</th>
        <td mat-cell *matCellDef="let row">
          <button mat-icon-button color="primary" (click)="openEdit(row)" title="Editar">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="openDelete(row)" title="Eliminar">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
    <mat-paginator [pageSizeOptions]="[10, 25, 50]" showFirstLastButtons />
  </div>
}
