<h2 mat-dialog-title>{{ isEdit ? 'Editar Gasto Fijo' : 'Nuevo Gasto Fijo' }}</h2>
<mat-dialog-content>
  <form [formGroup]="form" class="dialog-form">
    <div class="field-row">
      @if (isAdmin()) {
        <div class="field">
          <label>Usuario
            <app-select formControlName="userId" [items]="users"></app-select>
          </label>
        </div>
      }
      <div class="field">
        <label>Categoría (opcional)
          <app-select formControlName="categoryId" nullLabel="Sin categoría" [items]="categories"></app-select>
        </label>
      </div>
    </div>
    <div class="field">
      <label>Medio de Pago (opcional)
        <app-select formControlName="paymentMethodId" nullLabel="Sin medio de pago" [items]="paymentMethods" labelKey="displayName"></app-select>
      </label>
    </div>
    <div class="field">
      <label>Descripción
        <input formControlName="description" placeholder="Ej: Alquiler" />
      </label>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Monto (Gs.)
          <input formControlName="amount" appThousands />
        </label>
      </div>
      <div class="field">
        <label>Vence día (opcional)
          <input formControlName="dueDay" type="number" min="1" max="31" placeholder="1–31" />
        </label>
      </div>
    </div>
    <div class="field">
      <label>Notas (opcional)
        <textarea formControlName="notes" rows="2" placeholder="Observaciones..."></textarea>
      </label>
    </div>
    <mat-checkbox formControlName="isActive">Activo</mat-checkbox>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-stroked-button mat-dialog-close class="btn-cancel">Cancelar</button>
  <button mat-flat-button class="btn-primary" (click)="onSubmit()" [disabled]="form.invalid || saving">Guardar</button>
</mat-dialog-actions>
