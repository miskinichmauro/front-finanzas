<div class="login-page">

  <div class="login-brand">
    <div class="brand-icon">
      <mat-icon>account_balance</mat-icon>
    </div>
    <h1 class="brand-title">Finanzas</h1>
    <p class="brand-sub">Panel personal de finanzas y gastos compartidos</p>
  </div>

  <div class="login-form-panel">
    <button mat-icon-button class="theme-btn" type="button" (click)="theme.toggle()"
            [attr.aria-label]="theme.isDark() ? 'Cambiar a tema claro' : 'Cambiar a tema oscuro'"
            [title]="theme.isDark() ? 'Cambiar a tema claro' : 'Cambiar a tema oscuro'">
      <mat-icon>{{ theme.isDark() ? 'light_mode' : 'dark_mode' }}</mat-icon>
    </button>

    <div class="login-card">
      <h2 class="login-card__title">Bienvenido de nuevo</h2>
      <p class="login-card__sub">Ingresa tus credenciales para acceder al panel</p>

      <form (ngSubmit)="submit()" #f="ngForm" class="login-form">

        <div class="field">
          <label class="field-label" for="login-email">Email <span class="required-mark">*</span></label>
          <input id="login-email" type="text" [(ngModel)]="email" name="email"
                 autocomplete="username" placeholder="tu@email.com"
                 [class.field-input--invalid]="isEmailInvalid()" />
        </div>

        <div class="field">
          <label class="field-label" for="login-password">Contraseña <span class="required-mark">*</span></label>
          <div class="pass-wrapper" [class.pass-wrapper--invalid]="isPasswordInvalid()">
            <input id="login-password" [type]="showPass() ? 'text' : 'password'"
                   [(ngModel)]="password" name="password"
                   [attr.autocomplete]="showPass() ? 'off' : 'current-password'"
                   placeholder="********" />
            <button type="button" class="toggle-pass" (click)="showPass.set(!showPass())">
              <mat-icon>{{ showPass() ? 'visibility_off' : 'visibility' }}</mat-icon>
            </button>
          </div>
        </div>

        @if (error()) {
          <div class="login-error">
            <mat-icon>error_outline</mat-icon>
            {{ error() }}
          </div>
        }

        <button mat-flat-button class="login-btn" type="submit" [disabled]="loading()">
          @if (loading()) {
            <mat-spinner diameter="20" />
          } @else {
            Ingresar
          }
        </button>

        <p class="required-note">Los campos marcados con <span class="required-mark">*</span> son obligatorios.</p>
      </form>
    </div>

    <p class="login-footer">Finanzas - Panel personal</p>
  </div>

</div>
