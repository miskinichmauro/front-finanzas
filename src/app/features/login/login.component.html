<div class="login-page">

  <div class="login-brand">
    <div class="brand-icon">
      <mat-icon>account_balance</mat-icon>
    </div>
    <h1 class="brand-title">Finanzas</h1>
    <p class="brand-sub">Panel personal de finanzas y gastos compartidos</p>
  </div>

  <div class="login-form-panel">
    <div class="login-card">
      <h2 class="login-card__title">Bienvenido</h2>
      <p class="login-card__sub">Ingresá tus credenciales para continuar</p>

      <form (ngSubmit)="submit()" #f="ngForm" class="login-form">

        <mat-form-field appearance="outline" class="w-full">
          <mat-label>Email</mat-label>
          <input matInput type="email" [(ngModel)]="email" name="email" required autocomplete="email" />
          <mat-icon matPrefix>email</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline" class="w-full">
          <mat-label>Contraseña</mat-label>
          <input matInput [type]="showPass() ? 'text' : 'password'"
                 [(ngModel)]="password" name="password" required autocomplete="current-password" />
          <mat-icon matPrefix>lock</mat-icon>
          <button mat-icon-button matSuffix type="button" (click)="showPass.set(!showPass())">
            <mat-icon>{{ showPass() ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
        </mat-form-field>

        @if (error()) {
          <div class="login-error">
            <mat-icon>error_outline</mat-icon>
            {{ error() }}
          </div>
        }

        <button mat-flat-button class="login-btn" type="submit" [disabled]="loading() || !email || !password">
          @if (loading()) {
            <mat-spinner diameter="20" />
          } @else {
            Ingresar
          }
        </button>

      </form>
    </div>
  </div>

</div>
