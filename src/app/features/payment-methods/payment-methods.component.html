<app-page-header title="Medios de Pago" subtitle="Gestión de tarjetas y métodos de pago" />

<div class="flex justify-end mb-4">
  <button mat-flat-button color="primary" (click)="openCreate()">
    <mat-icon>add</mat-icon> Nuevo Medio de Pago
  </button>
</div>

@if (loading()) {
  <div class="flex justify-center py-12"><mat-spinner /></div>
} @else {
  <div class="mat-elevation-z2 rounded-lg overflow-hidden">
    <table mat-table [dataSource]="dataSource" matSort>
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Nombre</th>
        <td mat-cell *matCellDef="let row">{{ row.name }}</td>
      </ng-container>

      <ng-container matColumnDef="type">
        <th mat-header-cell *matHeaderCellDef>Tipo</th>
        <td mat-cell *matCellDef="let row">{{ row.type }}</td>
      </ng-container>

      <ng-container matColumnDef="bankName">
        <th mat-header-cell *matHeaderCellDef>Banco</th>
        <td mat-cell *matCellDef="let row">{{ row.bankName || '—' }}</td>
      </ng-container>

      <ng-container matColumnDef="lastDigits">
        <th mat-header-cell *matHeaderCellDef>Últimos dígitos</th>
        <td mat-cell *matCellDef="let row">{{ row.lastDigits || '—' }}</td>
      </ng-container>

      <ng-container matColumnDef="isActive">
        <th mat-header-cell *matHeaderCellDef>Estado</th>
        <td mat-cell *matCellDef="let row">
          <mat-chip>{{ row.isActive ? 'Activo' : 'Inactivo' }}</mat-chip>
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Acciones</th>
        <td mat-cell *matCellDef="let row">
          <button mat-icon-button color="primary" (click)="openEdit(row)"><mat-icon>edit</mat-icon></button>
          <button mat-icon-button color="warn" (click)="openDelete(row)"><mat-icon>delete</mat-icon></button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
    <mat-paginator [pageSizeOptions]="[10, 25, 50]" showFirstLastButtons />
  </div>
}
