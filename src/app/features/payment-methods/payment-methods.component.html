<app-page-header title="Medios de Pago" subtitle="Gestión de tarjetas y métodos de pago" />

<div class="page-toolbar">
  <div class="toolbar-field">
    <label>Buscar
      <input type="search" [(ngModel)]="searchText" (input)="applyFilter()" placeholder="Busqueda" style="width: 200px" />
    </label>
  </div>
  <div class="flex-1"></div>
  <button mat-flat-button class="btn-primary" (click)="openCreate()">
    <mat-icon>add</mat-icon>Nuevo Medio de Pago
  </button>
</div>

<div class="table-card">
  <div class="table-scroll">
  <table mat-table [dataSource]="dataSource" matSort>
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Nombre</th>
      <td mat-cell *matCellDef="let row">{{ row.name }}</td>
    </ng-container>

    <ng-container matColumnDef="bankName">
      <th mat-header-cell *matHeaderCellDef>Banco</th>
      <td mat-cell *matCellDef="let row">{{ row.bankName || '—' }}</td>
    </ng-container>

    <ng-container matColumnDef="lastDigits">
      <th mat-header-cell *matHeaderCellDef>Últimos dígitos</th>
      <td mat-cell *matCellDef="let row">{{ row.lastDigits || '—' }}</td>
    </ng-container>

    <ng-container matColumnDef="isActive">
      <th mat-header-cell *matHeaderCellDef>Estado</th>
      <td mat-cell *matCellDef="let row">
        <span class="badge" [ngClass]="row.isActive ? 'badge--green' : 'badge--red'">{{ row.isActive ? 'Activo' : 'Inactivo' }}</span>
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Acciones</th>
      <td mat-cell *matCellDef="let row">
        <app-row-actions
          editTooltip="Editar medio de pago"
          deleteTooltip="Eliminar medio de pago"
          (editAction)="openEdit(row)"
          (deleteAction)="openDelete(row)" />
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    <tr *matNoDataRow>
      <td [attr.colspan]="displayedColumns.length" class="empty-row-cell">
        @if (loading()) {
          <div class="loading-center"><mat-spinner /></div>
        } @else {
          <div class="empty-state">
            <mat-icon>credit_card_off</mat-icon>
            <span>No hay medios de pago registrados</span>
          </div>
        }
      </td>
    </tr>
  </table>
  </div>
  <div class="table-footer">
    <mat-paginator [pageSizeOptions]="[10, 25, 50]" showFirstLastButtons />
  </div>
</div>
