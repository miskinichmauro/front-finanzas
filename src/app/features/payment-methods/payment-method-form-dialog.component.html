<h2 mat-dialog-title>{{ isEdit ? 'Editar Medio de Pago' : 'Nuevo Medio de Pago' }}</h2>
<mat-dialog-content>
  <form [formGroup]="form" class="dialog-form">
    <div class="field">
      <label>Nombre
        <input formControlName="name" placeholder="Ej: Tarjeta Visa" />
      </label>
    </div>
    <div class="field">
      <label>Tipo
        <app-select formControlName="type" [items]="paymentTypes"></app-select>
      </label>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Banco (opcional)
          <input formControlName="bankName" placeholder="Nombre del banco" />
        </label>
      </div>
      <div class="field">
        <label>Últimos dígitos
          <input formControlName="lastDigits" placeholder="4 dígitos" maxlength="4" />
        </label>
      </div>
    </div>
    <mat-checkbox formControlName="isActive">Activo</mat-checkbox>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancelar</button>
  <button mat-flat-button class="btn-primary" (click)="onSubmit()" [disabled]="form.invalid || saving">Guardar</button>
</mat-dialog-actions>
