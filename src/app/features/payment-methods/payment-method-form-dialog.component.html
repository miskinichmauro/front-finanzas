<h2 mat-dialog-title>{{ isEdit ? 'Editar Medio de Pago' : 'Nuevo Medio de Pago' }}</h2>
<mat-dialog-content>
  <form [formGroup]="form" class="flex flex-col gap-4 pt-2 min-w-80">
    <mat-form-field appearance="outline">
      <mat-label>Nombre</mat-label>
      <input matInput formControlName="name" />
      @if (form.get('name')?.hasError('required')) {
        <mat-error>El nombre es requerido</mat-error>
      }
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Tipo</mat-label>
      <mat-select formControlName="type">
        @for (t of paymentTypes; track t) {
          <mat-option [value]="t">{{ t }}</mat-option>
        }
      </mat-select>
      @if (form.get('type')?.hasError('required')) {
        <mat-error>El tipo es requerido</mat-error>
      }
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Banco</mat-label>
      <input matInput formControlName="bankName" placeholder="Nombre del banco (opcional)" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Últimos dígitos</mat-label>
      <input matInput formControlName="lastDigits" placeholder="4 últimos dígitos (opcional)" maxlength="4" />
    </mat-form-field>

    <mat-checkbox formControlName="isActive">Activo</mat-checkbox>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancelar</button>
  <button mat-flat-button color="primary" (click)="onSubmit()" [disabled]="form.invalid">
    Guardar
  </button>
</mat-dialog-actions>
