<h2 mat-dialog-title>{{ isEdit ? 'Editar Comercio' : 'Nuevo Comercio' }}</h2>
<mat-dialog-content>
  <form [formGroup]="form" class="dialog-form">
    <div class="field">
      <label>Nombre
        <input formControlName="name" placeholder="Nombre del comercio" />
      </label>
    </div>
    <div class="field">
      <label>Dirección (opcional)
        <input formControlName="address" placeholder="Dirección del comercio" />
      </label>
    </div>
    <mat-checkbox formControlName="isFavorite">Favorito</mat-checkbox>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-stroked-button mat-dialog-close class="btn-cancel">Cancelar</button>
  <button mat-flat-button class="btn-primary" (click)="onSubmit()" [disabled]="form.invalid || saving">Guardar</button>
</mat-dialog-actions>
