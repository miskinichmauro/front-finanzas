<app-page-header title="Comercios" subtitle="Gestión de comercios y tiendas" />

<div class="page-toolbar">
  <div class="toolbar-field">
    <label>Buscar
      <input type="search" [(ngModel)]="searchText" (input)="applyFilter()" placeholder="Busqueda" style="width: 200px" />
    </label>
  </div>
  <div class="flex-1"></div>
  <button mat-flat-button class="btn-primary" (click)="openCreate()">
    <mat-icon>add</mat-icon>Nuevo Comercio
  </button>
</div>

<div class="table-card">
  <div class="table-scroll">
  <table mat-table [dataSource]="dataSource" matSort>
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Nombre</th>
      <td mat-cell *matCellDef="let row">{{ row.name }}</td>
    </ng-container>

    <ng-container matColumnDef="address">
      <th mat-header-cell *matHeaderCellDef>Dirección</th>
      <td mat-cell *matCellDef="let row">{{ row.address || '—' }}</td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Acciones</th>
      <td mat-cell *matCellDef="let row">
        <button mat-icon-button (click)="toggleFavorite(row)"
          [title]="row.isFavorite ? 'Quitar de favoritos' : 'Marcar como favorito'">
          <mat-icon [style.color]="row.isFavorite ? '#f59e0b' : '#cbd5e1'">
            {{ row.isFavorite ? 'star' : 'star_border' }}
          </mat-icon>
        </button>
        <app-row-actions
          editTooltip="Editar comercio"
          deleteTooltip="Eliminar comercio"
          (editAction)="openEdit(row)"
          (deleteAction)="openDelete(row)" />
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    <tr *matNoDataRow>
      <td [attr.colspan]="displayedColumns.length" class="empty-row-cell">
        @if (loading()) {
          <div class="loading-center"><mat-spinner /></div>
        } @else {
          <div class="empty-state">
            <mat-icon>storefront</mat-icon>
            <span>No hay comercios registrados</span>
          </div>
        }
      </td>
    </tr>
  </table>
  </div>
  <div class="table-footer">
    <mat-paginator [pageSizeOptions]="[10, 25, 50]" showFirstLastButtons />
  </div>
</div>
