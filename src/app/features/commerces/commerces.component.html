<app-page-header title="Comercios" subtitle="Gestión de comercios y tiendas" />

<div class="flex justify-end mb-4">
  <button mat-flat-button color="primary" (click)="openCreate()">
    <mat-icon>add</mat-icon> Nuevo Comercio
  </button>
</div>

@if (loading()) {
  <div class="flex justify-center py-12"><mat-spinner /></div>
} @else {
  <div class="mat-elevation-z2 rounded-lg overflow-hidden">
    <table mat-table [dataSource]="dataSource" matSort>
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Nombre</th>
        <td mat-cell *matCellDef="let row">{{ row.name }}</td>
      </ng-container>

      <ng-container matColumnDef="address">
        <th mat-header-cell *matHeaderCellDef>Dirección</th>
        <td mat-cell *matCellDef="let row">{{ row.address || '—' }}</td>
      </ng-container>

      <ng-container matColumnDef="isFavorite">
        <th mat-header-cell *matHeaderCellDef>Favorito</th>
        <td mat-cell *matCellDef="let row">
          <mat-icon [color]="row.isFavorite ? 'warn' : ''">
            {{ row.isFavorite ? 'star' : 'star_border' }}
          </mat-icon>
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Acciones</th>
        <td mat-cell *matCellDef="let row">
          <button mat-icon-button color="primary" (click)="openEdit(row)"><mat-icon>edit</mat-icon></button>
          <button mat-icon-button color="warn" (click)="openDelete(row)"><mat-icon>delete</mat-icon></button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
    <mat-paginator [pageSizeOptions]="[10, 25, 50]" showFirstLastButtons />
  </div>
}
